<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Payment - ShopFlow</title>
    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="payment.css">
</head>
<body>

<div id="header"></div>

<div id="content">
    <h1>Checkout Order</h1>
    
    <form id="paymentForm" class="checkout-form-layout">
        <div class="checkout-fields">
            <!-- Shipping Information -->
            <section id="shipping-info">
                <h2>Shipping Address</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" required placeholder="John Doe">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="address">Street Address</label>
                        <input type="text" id="address" required placeholder="123 Main St">
                    </div>
                </div>
                <div class="form-row grid-3">
                    <div class="form-group">
                        <label for="city">City</label>
                        <input type="text" id="city" required placeholder="New York">
                    </div>
                    <div class="form-group">
                        <label for="state">State</label>
                        <input type="text" id="state" required placeholder="NY">
                    </div>
                    <div class="form-group">
                        <label for="zipCode">Zip Code</label>
                        <input type="text" id="zipCode" required placeholder="10001">
                    </div>
                </div>
            </section>

            <!-- Payment Methods -->
            <section id="payment-methods">
                <h2>Payment Method</h2>
                <div class="payment-options">
                    <label class="radio-label">
                        <input type="radio" id="creditCard" name="paymentMethod" value="creditCard" checked>
                        <span>Credit / Debit Card</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" id="paypal" name="paymentMethod" value="paypal">
                        <span>PayPal</span>
                    </label>
                </div>

                <!-- Credit Card Fields -->
                <div id="creditCardDetails" class="payment-details-box">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="cardNumber">Card Number</label>
                            <input type="text" id="cardNumber" placeholder="4111 2222 3333 4444" pattern="[0-9\\s]{13,19}">
                        </div>
                    </div>
                    <div class="form-row grid-2">
                        <div class="form-group">
                            <label for="expiryDate">Expiry Date</label>
                            <input type="text" id="expiryDate" placeholder="MM/YY">
                        </div>
                        <div class="form-group">
                            <label for="cvv">CVV</label>
                            <input type="password" id="cvv" placeholder="•••" maxlength="4">
                        </div>
                    </div>
                </div>

                <!-- PayPal Fields -->
                <div id="paypalDetails" class="payment-details-box" style="display: none;">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="paypalEmail">PayPal Email Address</label>
                            <input type="email" id="paypalEmail" placeholder="paypal@mail.com">
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <!-- Order Summary & Submit -->
        <div class="checkout-summary">
            <section id="order-summary" class="summary-section">
                <h2>Order Summary</h2>
                <ul id="summaryItemsList" class="summary-items-list">
                    <!-- Dynamic Cart Items list -->
                </ul>
                <hr>
                <div class="summary-total-line">
                    <span>Total Amount:</span>
                    <strong id="summaryTotalPrice">$0.00</strong>
                </div>
                <button type="submit" class="btn-primary place-order-btn">
                    Place Order
                </button>
            </section>
        </div>
    </form>
</div>

<div id="footer"></div>

<script src="header.js"></script>
<script src="payment.js"></script>
<script src="footer.js"></script>
</body>
</html>
