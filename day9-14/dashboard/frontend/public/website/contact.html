<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - ShopFlow</title>
    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="contact.css">
</head>
<body>

<div id="header"></div>

<div id="content">
    <div class="contact-page-layout">
        <!-- Contact details column -->
        <div class="contact-info-panel">
            <h1>Contact Us</h1>
            <p>Have questions about your order, products, or shipping status? Get in touch with us today!</p>
            
            <div class="contact-channels">
                <div class="channel-card">
                    <div class="channel-icon">
                        <svg viewBox="0 0 24 24" width="20" height="20">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" stroke="currentColor" stroke-width="2" fill="none"/>
                            <polyline points="22,6 12,13 2,6" stroke="currentColor" stroke-width="2" fill="none"/>
                        </svg>
                    </div>
                    <div>
                        <h4>Email Support</h4>
                        <p>support@shopflow.com</p>
                    </div>
                </div>

                <div class="channel-card">
                    <div class="channel-icon">
                        <svg viewBox="0 0 24 24" width="20" height="20">
                            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" stroke="currentColor" stroke-width="2" fill="none"/>
                        </svg>
                    </div>
                    <div>
                        <h4>Phone Desk</h4>
                        <p>+1 800 123 4567</p>
                    </div>
                </div>

                <div class="channel-card">
                    <div class="channel-icon">
                        <svg viewBox="0 0 24 24" width="20" height="20">
                            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"/>
                            <polyline points="12 6 12 12 16 14" stroke="currentColor" stroke-width="2" fill="none"/>
                        </svg>
                    </div>
                    <div>
                        <h4>Working Hours</h4>
                        <p>Monday - Friday: 9 AM - 6 PM EST</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Contact form column -->
        <div class="contact-form-panel">
            <form id="contactForm" class="contact-form">
                <h2>Send a Message</h2>
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" required placeholder="John Doe">
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="john@example.com">
                </div>

                <div class="form-group">
                    <label for="message">Message Body</label>
                    <textarea id="message" required placeholder="Type your question or feedback..." rows="5"></textarea>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%;">Send Message</button>
            </form>
        </div>
    </div>
</div>

<div id="footer"></div>

<script src="header.js"></script>
<script src="contact.js"></script>
<script src="footer.js"></script>
</body>
</html>
