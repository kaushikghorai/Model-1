<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - ShopFlow</title>
    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="cart.css">
</head>
<body>

<div id="header"></div>

<div id="content">
    <h1>Shopping Cart</h1>
    
    <div class="cart-layout">
        <!-- Cart Items List Table -->
        <div class="cart-items-wrapper">
            <div class="table-responsive">
                <table id="cartTable">
                    <thead>
                        <tr>
                            <th style="width: 80px;">Item</th>
                            <th>Product Name</th>
                            <th>Price</th>
                            <th style="width: 120px;">Quantity</th>
                            <th>Total</th>
                            <th style="width: 80px; text-align: center;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="cartTableBody">
                        <!-- Dynamic items inserted here -->
                    </tbody>
                </table>
            </div>
            <div id="emptyCartMessage" class="empty-cart" style="display: none;">
                <p>Your shopping cart is empty.</p>
                <br>
                <a href="products.html" class="btn-primary">Continue Shopping</a>
            </div>
        </div>

        <!-- Cart Summary Box -->
        <div id="cartSummary" class="cart-summary-card">
            <h2>Order Summary</h2>
            <div class="summary-line">
                <span>Subtotal</span>
                <span id="summarySubtotal">$0.00</span>
            </div>
            <div class="summary-line">
                <span>Shipping</span>
                <span style="color: var(--success); font-weight: 600;">FREE</span>
            </div>
            <hr>
            <div class="summary-line total">
                <span>Total Price</span>
                <span id="summaryTotal">$0.00</span>
            </div>
            <a href="payment.html" class="btn-primary checkout-btn" id="checkoutBtn">
                Proceed to Checkout
            </a>
        </div>
    </div>
</div>

<div id="footer"></div>

<script src="header.js"></script>
<script src="cart.js"></script>
<script src="footer.js"></script>
</body>
</html>
