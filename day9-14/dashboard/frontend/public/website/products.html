<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products Catalog - ShopFlow</title>
    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="products.css">
</head>
<body>

<div id="header"></div>

<div id="content">
    <div class="catalog-header">
        <h1>All Products</h1>
        <p>Browse our handpicked collections and discover top-rated items.</p>
    </div>

    <!-- Filter and Search controls -->
    <div class="filter-form">
        <div class="search-input-wrapper">
            <svg viewBox="0 0 24 24" width="18" height="18">
                <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2.5" fill="none"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
            <input type="text" id="searchInput" placeholder="Search products by title...">
        </div>
        <div class="select-wrapper">
            <select id="categorySelect">
                <option value="all">All Categories</option>
                <option value="electronics">Electronics</option>
                <option value="jewelery">Jewelery</option>
                <option value="men's clothing">Men's Clothing</option>
                <option value="women's clothing">Women's Clothing</option>
            </select>
        </div>
    </div>

    <!-- Dynamic Product Cards Grid -->
    <div id="productGrid" class="product-grid">
        <div class="loading-state">Loading products...</div>
    </div>
</div>

<div id="footer"></div>

<script src="header.js"></script>
<script src="products.js"></script>
<script src="footer.js"></script>
</body>
</html>
