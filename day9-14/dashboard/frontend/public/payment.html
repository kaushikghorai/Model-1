<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>
    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="payment.css">
</head>
<body>

<div id="header"></div>

<div id="content">
    <h1>Checkout</h1>
    
    <form id="paymentForm">
        <section id="payment-methods">
            <h2>Payment Methods</h2>
            <label for="creditCard">Credit Card</label>
            <input type="radio" id="creditCard" name="paymentMethod" value="creditCard">
            <div class="payment-details">
                <label for="cardNumber">Card Number:</label>
                <input type="text" id="cardNumber" name="cardNumber" required>
                <br>
                <label for="expiryDate">Expiry Date:</label>
                <input type="text" id="expiryDate" name="expiryDate" required>
                <br>
                <label for="cvv">CVV:</label>
                <input type="text" id="cvv" name="cvv" required>
            </div>

            <label for="paypal">PayPal</label>
            <input type="radio" id="paypal" name="paymentMethod" value="paypal">
            <div class="payment-details" style="display: none;">
                <label for="paypalEmail">PayPal Email:</label>
                <input type="email" id="paypalEmail" name="paypalEmail" required>
            </div>

            <button type="button" onclick="togglePaymentDetails()">Use PayPal</button>
        </section>

        <section id="shipping-info">
            <h2>Shipping Information</h2>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            <br>
            <label for="address">Address:</label>
            <input type="text" id="address" name="address" required>
            <br>
            <label for="city">City:</label>
            <input type="text" id="city" name="city" required>
            <br>
            <label for="state">State:</label>
            <input type="text" id="state" name="state" required>
            <br>
            <label for="zipCode">Zip Code:</label>
            <input type="text" id="zipCode" name="zipCode" required>
        </section>

        <section id="order-summary">
            <h2>Order Summary</h2>
            <ul>
                <li><strong>Product 1:</strong> $50.00</li>
                <li><strong>Product 2:</strong> $30.00</li>
                <li><strong>Total:</strong> $80.00</li>
            </ul>
        </section>

        <button type="submit">Place Order</button>
    </form>
</div>

<div id="footer"></div>
<script src="header.js"></script>
<script src="scripts.js"></script>
<script src="payment.js"></script>
<script src="footer.js"></script>
</body>
</html>
