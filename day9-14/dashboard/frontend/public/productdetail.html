<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details</title>
    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="productdetail.css">
</head>
<body>

<div id="header"></div>

<div id="content">
    <h1>Product Name</h1>
    
    <div class="product-image">
        <img src="path/to/product.jpg" alt="Product Image">
    </div>

    <section id="product-info">
        <h2>Product Information</h2>
        <ul>
            <li><strong>Price:</strong> $50.00</li>
            <li><strong>Availability:</strong> In Stock</li>
            <li><strong>Category:</strong> Electronics</li>
        </ul>
    </section>

    <section id="description">
        <h2>Description</h2>
        <p>This is a detailed description of the product. It includes all important features and specifications 
that customers need to know before making a purchase.</p>
    </section>

    <div class="add-to-cart">
        <button onclick="addToCart()">Add to Cart</button>
    </div>
</div>

<div id="footer"></div>
<script src="header.js"></script>
<script src="scripts.js"></script>
<script src="productdetail.js"></script>
<script src="footer.js"></script>
</body>
</html>
