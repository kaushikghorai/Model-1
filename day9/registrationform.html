<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - TechStore</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="footer.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
<div id="header"></div>

<div id="content" class="auth-layout">
    <div class="auth-form-container glass-panel">
        <div class="auth-header text-center">
            <h1>Create Account</h1>
            <p class="text-muted">Join TechStore to unlock premium features</p>
        </div>

        <form action="#" method="post" class="auth-form">
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" name="username" class="form-control" required placeholder="Choose a username">
            </div>
            
            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" required placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-control" required placeholder="Create a strong password">
            </div>

            <div class="form-group">
                <label for="confirm_password" class="form-label">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control" required placeholder="Repeat your password">
            </div>

            <button type="submit" class="btn btn-primary w-100 mt-4">Register</button>
        </form>

        <div class="auth-footer text-center">
            <p class="text-muted">Already have an account? <a href="login.html">Sign in</a></p>
        </div>
    </div>
</div>

<div id="footer"></div>
<script src="header.js"></script>
<script src="registrationform.js"></script>
<script src="footer.js"></script>
</body>
</html>
