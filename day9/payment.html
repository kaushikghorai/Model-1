<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - TechStore</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="footer.css">
    <link rel="stylesheet" href="payment.css">
</head>
<body>
<div id="header"></div>

<div id="content" class="container section page-layout">
    
    <!-- Progress Steps -->
    <div class="checkout-steps">
        <div class="step completed">
            <div class="step-number">✓</div>
            <span class="step-text">Cart</span>
        </div>
        <div class="step-divider completed"></div>
        <div class="step active">
            <div class="step-number">2</div>
            <span class="step-text">Checkout</span>
        </div>
        <div class="step-divider"></div>
        <div class="step">
            <div class="step-number">3</div>
            <span class="step-text">Confirmation</span>
        </div>
    </div>

    <form id="paymentForm" class="checkout-form">
        <div class="checkout-main glass-panel">
            <h2>Shipping Information</h2>
            <div class="form-row">
                <div class="form-group half-width">
                    <label for="firstName" class="form-label">First Name</label>
                    <input type="text" id="firstName" name="firstName" class="form-control" required placeholder="John">
                </div>
                <div class="form-group half-width">
                    <label for="lastName" class="form-label">Last Name</label>
                    <input type="text" id="lastName" name="lastName" class="form-control" required placeholder="Doe">
                </div>
            </div>
            <div class="form-group">
                <label for="address" class="form-label">Address</label>
                <input type="text" id="address" name="address" class="form-control" required placeholder="123 Tech Avenue">
            </div>
            <div class="form-row">
                <div class="form-group third-width">
                    <label for="city" class="form-label">City</label>
                    <input type="text" id="city" name="city" class="form-control" required placeholder="San Francisco">
                </div>
                <div class="form-group third-width">
                    <label for="state" class="form-label">State</label>
                    <input type="text" id="state" name="state" class="form-control" required placeholder="CA">
                </div>
                <div class="form-group third-width">
                    <label for="zipCode" class="form-label">Zip Code</label>
                    <input type="text" id="zipCode" name="zipCode" class="form-control" required placeholder="94107">
                </div>
            </div>

            <h2 class="mt-4">Payment Method</h2>
            <div class="payment-methods">
                <label class="payment-option">
                    <input type="radio" name="paymentMethod" value="creditCard" checked>
                    <span class="option-content">
                        <span class="option-title">Credit Card</span>
                        <span class="option-icons">💳</span>
                    </span>
                </label>
                <label class="payment-option">
                    <input type="radio" name="paymentMethod" value="paypal">
                    <span class="option-content">
                        <span class="option-title">PayPal</span>
                        <span class="option-icons">🅿️</span>
                    </span>
                </label>
            </div>

            <div class="payment-details mt-4" id="creditCardDetails">
                <div class="form-group">
                    <label for="cardNumber" class="form-label">Card Number</label>
                    <div class="input-with-icon">
                        <span class="input-icon">💳</span>
                        <input type="text" id="cardNumber" name="cardNumber" class="form-control" placeholder="0000 0000 0000 0000">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group half-width">
                        <label for="expiryDate" class="form-label">Expiry Date</label>
                        <input type="text" id="expiryDate" name="expiryDate" class="form-control" placeholder="MM/YY">
                    </div>
                    <div class="form-group half-width">
                        <label for="cvv" class="form-label">CVV</label>
                        <input type="text" id="cvv" name="cvv" class="form-control" placeholder="123">
                    </div>
                </div>
            </div>

            <label class="checkbox-group">
                <input type="checkbox" checked>
                <span>Billing address same as shipping</span>
            </label>
        </div>

        <div class="checkout-sidebar glass-panel">
            <h2>Order Summary</h2>
            <div class="summary-items">
                <div class="summary-item">
                    <img src="images/product1.png" alt="Headphones">
                    <div class="item-details">
                        <h4>Quantum Headphones</h4>
                        <p class="text-muted">Qty: 1</p>
                    </div>
                    <span class="price">$299.00</span>
                </div>
                <div class="summary-item">
                    <img src="images/product2.png" alt="Smartwatch">
                    <div class="item-details">
                        <h4>Nexus Smartwatch Pro</h4>
                        <p class="text-muted">Qty: 1</p>
                    </div>
                    <span class="price">$199.00</span>
                </div>
            </div>
            <hr class="summary-divider">
            <div class="summary-row">
                <span>Subtotal</span>
                <span>$498.00</span>
            </div>
            <div class="summary-row">
                <span>Shipping</span>
                <span class="text-secondary">Free</span>
            </div>
            <div class="summary-row">
                <span>Tax</span>
                <span>$42.33</span>
            </div>
            <hr class="summary-divider">
            <div class="summary-row total-row">
                <span>Total</span>
                <span class="price-total">$540.33</span>
            </div>
            <button type="submit" class="btn btn-primary w-100 mt-4 place-order-btn">Complete Purchase</button>
            <p class="secure-checkout text-muted mt-4 text-center">
                🔒 Secured by 256-bit encryption
            </p>
        </div>
    </form>
</div>

<div id="footer"></div>
<script src="header.js"></script>
<script src="payment.js"></script>
<script src="footer.js"></script>
</body>
</html>
