<!DOCTYPE html>
<html>
<head>
    <title>unordered table</title>
</head>
<body>

<table border="1" width="700px" height="200px">
    <tr>
        <th colspan="2">A</th>
        <th colspan="4">B</th>
        <th rowspan="4">J</th>
    </tr>
    <tr>
        <td>C</td>
        <td>D</td>
        <td>E</td>
        <td>F</td>
        <td>G</td>
        <td>H</td>
    </tr>
    <tr>
        <td rowspan="2">K</td>
        <td>M</td>
        <td colspan="2">N</td>
        <td colspan="2">I</td>
    </tr>
    <tr>
        <td>L</td>
        <td>P</td>
        <td>O</td>
        <td>I</td>
        <td>H</td>
    </tr>

</table>

</body>
</html>
