<!DOCTYPE html>
<html>
	<head>
		<title>Registration</title>
	</head>
	<body>
		<h1>Registration Form</h1>
		<form>
			<div>
				<label>Submission date:</label>
				<input type="date" name="submissiondate" readonly>
			</div><br><br>
			<div>
				<label>Email:</label><br>
				<input type="email" name="email" required>
			</div><br><br>
			<div>
				<label>Name:</label><br>
				<input type="text" name="name">
			</div><br><br>
			<div>
				<label>username:</label><br>
				<input type="text" name="uname">
			</div><br>
			<div>
				<label>Password:</label><br>
				<input type="password" name="passwd" required>
			</div><br><br>
			<div>
				<label>Gender:</label>
				<input type="radio" name="m" group="gender">Male
				<input type="radio" name="f" group="gender">Female
			</div><br><br>
			<div>
				<input type="button" name="button" value="anybutton">
			</div><br><br>
			<div>
				<label>Hobby:</label>
				<input type="checkbox" name="music" group="hobby">Music
				<input type="checkbox" name="games" group="hobby">Games
				<input type="checkbox" name="reading" group="hobby">Reading
				<input type="checkbox" name="sports" group="hobby">Sports
			</div><br><br>
			<div>
				<label>Favourate Color:</label>
				<input type="color" name="color">
			</div><br><br>
			<div>
				<label>datetime-local</label>
				<input type="datetime-local">
			</div>
			<div>
				<label>file</label>
				<input type="file" name="file" required>
			</div><br><br>
			<div>
				<label>hidden</label>
				<input type="hidden" name="hiddenInput">
			</div><br><br>
			<div>
				<label>image</label>
				<input type="image" name="imageInput">
			</div><br><br>
			<div>
				<label>month</label>
				<input type="month" name="motheInput">
			</div><br><br>
			<div>
				<label>number</label>
				<input type="number" name="numberInput">
			</div>
			<div>
				<label>range</label>
				<input type="range" name="rangeInput">
			</div>
			<div>
				<label>search</label>
				<input type="search" name="searchInput">
			</div>
			<div>
				<label>tel</label>
				<input type="tel" name="telInput">
			</div>
			<div>
				<label>time</label>
				<input type="time" name="timeInput">
			</div>
			<div>
				<label>url</label>
				<input type="url" name="urlInput">
			</div>
			<div>
				<label>week</label>
				<input type="week" name="weekInput">
			</div>
		</form>
	</body>
</html>
