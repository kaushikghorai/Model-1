<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TechStore</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="footer.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
<div id="header"></div>

<div id="content" class="auth-layout">
    <div class="auth-form-container glass-panel">
        <div class="auth-header text-center">
            <h1>Welcome Back</h1>
            <p class="text-muted">Sign in to your account to continue</p>
        </div>

        <form action="#" method="post" class="auth-form">
            <div class="form-group">
                <label for="username" class="form-label">Username or Email</label>
                <input type="text" id="username" name="username" class="form-control" required placeholder="Enter your username">
            </div>
            
            <div class="form-group">
                <div class="password-header">
                    <label for="password" class="form-label">Password</label>
                    <a href="forgotpassword.html" class="forgot-link">Forgot password?</a>
                </div>
                <input type="password" id="password" name="password" class="form-control" required placeholder="Enter your password">
            </div>

            <button type="submit" class="btn btn-primary w-100 mt-4">Sign In</button>
        </form>

        <div class="auth-footer text-center">
            <p class="text-muted">Don't have an account? <a href="registrationform.html">Create one</a></p>
        </div>
    </div>
</div>

<div id="footer"></div>
<script src="header.js"></script>
<script src="login.js"></script>
<script src="footer.js"></script>
</body>
</html>
