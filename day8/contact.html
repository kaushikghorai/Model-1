<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - TechStore</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="footer.css">
    <link rel="stylesheet" href="contact.css">
</head>
<body>

<div id="header"></div>

<div id="content" class="container contact-section">
    <div class="contact-layout">
        <div class="contact-info">
            <h1 class="text-gradient">Get in Touch</h1>
            <p>Have questions about our products or your order? Our team is here to help you.</p>
            
            <div class="contact-details">
                <div class="contact-item">
                    <div class="contact-item-icon">📍</div>
                    <div>
                        <h4 class="text-main">Our Office</h4>
                        <p class="text-muted mb-0">123 Tech Boulevard, CA 94043</p>
                    </div>
                </div>
                <div class="contact-item">
                    <div class="contact-item-icon">✉️</div>
                    <div>
                        <h4 class="text-main">Email Us</h4>
                        <p class="text-muted mb-0">support@techstore.com</p>
                    </div>
                </div>
                <div class="contact-item">
                    <div class="contact-item-icon">📞</div>
                    <div>
                        <h4 class="text-main">Call Us</h4>
                        <p class="text-muted mb-0">+1 (800) 123-4567</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="contact-form-container glass-panel">
            <form action="#" method="post" class="contact-form">
                <div class="form-group">
                    <label for="name" class="form-label">Name</label>
                    <input type="text" id="name" name="name" class="form-control" required placeholder="John Doe">
                </div>
                
                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" name="email" class="form-control" required placeholder="john@example.com">
                </div>

                <div class="form-group">
                    <label for="message" class="form-label">Message</label>
                    <textarea id="message" name="message" class="form-control" rows="5" required placeholder="How can we help you?"></textarea>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
            </form>
        </div>
    </div>
</div>

<div id="footer"></div>
<script src="header.js"></script>
<script src="contact.js"></script>
<script src="footer.js"></script>
</body>
</html>
